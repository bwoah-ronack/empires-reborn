<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empires Reborn</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>EMPIRES REBORN</h1>

        <div class="stats" id="stats"></div>

        <div class="city-panel">
            <h2>City Status</h2>
            <div id="cityInfo"></div>
        </div>

        <div class="actions">
            <button onclick="buyBusiness()">Buy Business ($5000)</button>
            <button onclick="bribePolice()">Bribe Police ($3000)</button>
            <button onclick="launchPropaganda()">Launch Propaganda ($4000)</button>
            <button onclick="expandTerritory()">Expand Territory ($10000)</button>
            <button onclick="investStocks()">Invest In Stocks</button>
            <button onclick="viewIntel()">View Intelligence</button>
            <button onclick="publicWelfare()">Public Welfare ($6000)</button>
            <button onclick="endTurn()">End Turn</button>
        </div>

        <div class="log" id="log"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
